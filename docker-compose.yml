version: '3.8'

services:
  academic-app:
    build: .
    container_name: sistema_academico_run
    environment:
      # Deixando o valor fixo aqui dentro, o PowerShell nunca mais vai reclamar de variável vazia
      - DISPLAY=host.docker.internal:0.0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"